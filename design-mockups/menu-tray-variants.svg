<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf6"/>
      <stop offset="1" stop-color="#f4f0ec"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff7f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#2a1809" flood-opacity=".14"/>
    </filter>
    <style>
      .page { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #141414; }
      .caption { font-size: 20px; font-weight: 700; }
      .note { font-size: 13px; fill: #73665d; }
      .panel-title { font-size: 16px; font-weight: 720; }
      .panel-sub { font-size: 12px; fill: #786c63; }
      .group { font-size: 10px; font-weight: 800; fill: #a15a22; letter-spacing: .08em; }
      .label { font-size: 13px; font-weight: 650; fill: #16120f; }
      .desc { font-size: 11px; fill: #75695f; }
      .orange { fill: #ff6700; }
      .line { stroke: #eadfd5; stroke-width: 1; }
      .chip { fill: #fff3eb; stroke: #ffd1b5; stroke-width: 1; }
      .icon-bg { fill: #fff1e8; stroke: #ffd4bd; stroke-width: 1; }
      .soft-row { fill: #fffaf6; stroke: #efe3d9; stroke-width: 1; }
      .active-row { fill: #fff3ea; stroke: #ffb581; stroke-width: 1; }
      .small { font-size: 10px; font-weight: 700; }
    </style>
    <g id="leaf-logo">
      <path d="M10 4h16l8 8v24H10z" fill="none" stroke="#ff6700" stroke-width="3" stroke-linejoin="round"/>
      <path d="M9 29C16 14 27 14 34 15c-1 8-7 17-20 20 3-6 8-11 15-15-8 3-14 9-19 17" fill="#ff6700"/>
    </g>
    <g id="gear">
      <circle cx="16" cy="16" r="4" fill="none" stroke="#ff6700" stroke-width="2"/>
      <path d="M16 4v4M16 24v4M4 16h4M24 16h4M7.5 7.5l3 3M21.5 21.5l3 3M24.5 7.5l-3 3M10.5 21.5l-3 3" stroke="#ff6700" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g id="info">
      <circle cx="16" cy="16" r="11" fill="none" stroke="#ff6700" stroke-width="2"/>
      <path d="M16 14v7M16 10h.1" stroke="#ff6700" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g id="download">
      <path d="M16 5v16M10 15l6 6 6-6M8 27h16" fill="none" stroke="#ff6700" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="files">
      <path d="M6 9h9l3 3h8v13H6z" fill="none" stroke="#ff6700" stroke-width="2" stroke-linejoin="round"/>
    </g>
    <g id="toggle">
      <rect x="0" y="0" width="32" height="18" rx="9" fill="#ff6700"/>
      <circle cx="23" cy="9" r="6" fill="#fff"/>
    </g>
  </defs>

  <rect width="1500" height="760" fill="url(#bg)"/>
  <g class="page">
    <text x="70" y="68" class="caption">LocalLeaf editor menu tray - three cleaner directions</text>
    <text x="70" y="94" class="note">The goal is softer typography, smaller action rows, clearer hierarchy, and less heavy bold text.</text>

    <g transform="translate(70 140)" filter="url(#shadow)">
      <rect width="410" height="540" rx="18" fill="url(#panel)" stroke="#eadfd5"/>
      <g transform="translate(24 24)">
        <use href="#leaf-logo" width="40" height="40"/>
        <text x="54" y="19" class="panel-title">Variant A</text>
        <text x="54" y="39" class="panel-sub">Compact workspace list</text>
      </g>
      <line x1="0" y1="86" x2="410" y2="86" class="line"/>
      <g transform="translate(24 110)">
        <text class="group" x="0" y="0">WORKSPACE</text>
        <rect x="0" y="18" width="362" height="58" rx="12" class="active-row"/>
        <rect x="13" y="32" width="32" height="32" rx="9" class="icon-bg"/>
        <use href="#gear" x="13" y="32" width="32" height="32"/>
        <text x="58" y="43" class="label">Settings</text>
        <text x="58" y="62" class="desc">Theme, updates, and local models</text>
        <rect x="0" y="86" width="362" height="58" rx="12" class="soft-row"/>
        <rect x="13" y="100" width="32" height="32" rx="9" class="icon-bg"/>
        <use href="#info" x="13" y="100" width="32" height="32"/>
        <text x="58" y="111" class="label">Help</text>
        <text x="58" y="130" class="desc">Shortcuts and app guidance</text>
        <rect x="0" y="154" width="362" height="58" rx="12" class="soft-row"/>
        <rect x="13" y="168" width="32" height="32" rx="9" class="icon-bg"/>
        <use href="#download" x="13" y="168" width="32" height="32"/>
        <text x="58" y="179" class="label">Check for updates</text>
        <text x="58" y="198" class="desc">Latest LocalLeaf build</text>

        <text class="group" x="0" y="254">LAYOUT</text>
        <g transform="translate(0 274)">
          <rect width="174" height="50" rx="12" class="chip"/>
          <rect x="14" y="15" width="17" height="17" rx="4" fill="none" stroke="#ff6700"/>
          <text x="42" y="21" class="label">Files</text>
          <text x="42" y="38" class="desc">Project tree</text>
          <text x="143" y="30" class="orange small">On</text>
        </g>
        <g transform="translate(188 274)">
          <rect width="174" height="50" rx="12" class="chip"/>
          <rect x="14" y="15" width="17" height="17" rx="4" fill="none" stroke="#ff6700"/>
          <text x="42" y="21" class="label">Editor</text>
          <text x="42" y="38" class="desc">Source pane</text>
          <text x="143" y="30" class="orange small">On</text>
        </g>
        <g transform="translate(0 334)">
          <rect width="174" height="50" rx="12" class="chip"/>
          <rect x="14" y="15" width="17" height="17" rx="4" fill="none" stroke="#ff6700"/>
          <text x="42" y="21" class="label">PDF</text>
          <text x="42" y="38" class="desc">Preview pane</text>
          <text x="143" y="30" class="orange small">On</text>
        </g>
        <g transform="translate(188 334)">
          <rect width="174" height="50" rx="12" class="chip"/>
          <rect x="14" y="15" width="17" height="17" rx="4" fill="none" stroke="#ff6700"/>
          <text x="42" y="21" class="label">Chat</text>
          <text x="42" y="38" class="desc">Right rail</text>
          <text x="143" y="30" class="orange small">On</text>
        </g>
      </g>
    </g>

    <g transform="translate(545 140)" filter="url(#shadow)">
      <rect width="410" height="540" rx="18" fill="url(#panel)" stroke="#eadfd5"/>
      <g transform="translate(24 24)">
        <use href="#leaf-logo" width="40" height="40"/>
        <text x="54" y="19" class="panel-title">Variant B</text>
        <text x="54" y="39" class="panel-sub">Balanced cards with toggles</text>
      </g>
      <line x1="0" y1="86" x2="410" y2="86" class="line"/>
      <g transform="translate(24 112)">
        <rect width="362" height="82" rx="14" fill="#fff" stroke="#eadfd5"/>
        <text x="18" y="28" class="panel-title">Workspace</text>
        <text x="18" y="50" class="panel-sub">Task3_LaTeX_Source_Package 3</text>
        <rect x="286" y="20" width="58" height="32" rx="10" fill="#fff3eb" stroke="#ffd1b5"/>
        <text x="304" y="41" class="orange small">Edit</text>

        <text class="group" x="0" y="126">ACTIONS</text>
        <g transform="translate(0 146)">
          <rect width="174" height="74" rx="14" class="soft-row"/>
          <rect x="14" y="14" width="30" height="30" rx="9" class="icon-bg"/>
          <use href="#gear" x="14" y="14" width="30" height="30"/>
          <text x="58" y="28" class="label">Settings</text>
          <text x="58" y="47" class="desc">Theme and models</text>
        </g>
        <g transform="translate(188 146)">
          <rect width="174" height="74" rx="14" class="soft-row"/>
          <rect x="14" y="14" width="30" height="30" rx="9" class="icon-bg"/>
          <use href="#download" x="14" y="14" width="30" height="30"/>
          <text x="58" y="28" class="label">Updates</text>
          <text x="58" y="47" class="desc">Check versions</text>
        </g>

        <text class="group" x="0" y="256">VIEW</text>
        <g transform="translate(0 276)">
          <rect width="362" height="48" rx="12" class="chip"/>
          <use href="#files" x="14" y="10" width="30" height="30"/>
          <text x="58" y="21" class="label">Files panel</text>
          <text x="58" y="38" class="desc">Project tree and outline</text>
          <use href="#toggle" x="306" y="15"/>
        </g>
        <g transform="translate(0 334)">
          <rect width="362" height="48" rx="12" class="chip"/>
          <rect x="17" y="15" width="20" height="18" rx="4" fill="none" stroke="#ff6700" stroke-width="2"/>
          <text x="58" y="21" class="label">PDF preview</text>
          <text x="58" y="38" class="desc">Compiled output</text>
          <use href="#toggle" x="306" y="15"/>
        </g>
        <g transform="translate(0 392)">
          <rect width="362" height="48" rx="12" class="chip"/>
          <rect x="17" y="15" width="20" height="18" rx="4" fill="none" stroke="#ff6700" stroke-width="2"/>
          <text x="58" y="21" class="label">Chat and users</text>
          <text x="58" y="38" class="desc">Collaboration rail</text>
          <use href="#toggle" x="306" y="15"/>
        </g>
      </g>
    </g>

    <g transform="translate(1020 140)" filter="url(#shadow)">
      <rect width="410" height="540" rx="18" fill="url(#panel)" stroke="#eadfd5"/>
      <g transform="translate(24 24)">
        <use href="#leaf-logo" width="40" height="40"/>
        <text x="54" y="19" class="panel-title">Variant C</text>
        <text x="54" y="39" class="panel-sub">Menu with quick command header</text>
      </g>
      <line x1="0" y1="86" x2="410" y2="86" class="line"/>
      <g transform="translate(24 110)">
        <rect width="362" height="46" rx="12" fill="#fff" stroke="#eadfd5"/>
        <text x="18" y="29" class="desc">Search actions or settings...</text>
        <rect x="313" y="8" width="33" height="30" rx="9" fill="#fff3eb" stroke="#ffd1b5"/>
        <text x="324" y="28" class="orange small">/</text>

        <text class="group" x="0" y="94">MOST USED</text>
        <g transform="translate(0 114)">
          <rect width="362" height="64" rx="14" class="active-row"/>
          <use href="#download" x="16" y="16" width="32" height="32"/>
          <text x="64" y="27" class="label">Download ZIP</text>
          <text x="64" y="46" class="desc">Save the current project</text>
          <text x="302" y="37" class="orange small">Ctrl+D</text>
        </g>
        <g transform="translate(0 188)">
          <rect width="362" height="64" rx="14" class="soft-row"/>
          <use href="#gear" x="16" y="16" width="32" height="32"/>
          <text x="64" y="27" class="label">Settings</text>
          <text x="64" y="46" class="desc">Theme and updates</text>
        </g>

        <text class="group" x="0" y="292">LAYOUT</text>
        <g transform="translate(0 312)">
          <rect width="108" height="76" rx="14" class="chip"/>
          <rect x="14" y="15" width="17" height="17" rx="4" fill="none" stroke="#ff6700"/>
          <text x="14" y="50" class="label">Files</text>
          <text x="14" y="66" class="orange small">Visible</text>
        </g>
        <g transform="translate(127 312)">
          <rect width="108" height="76" rx="14" class="chip"/>
          <rect x="14" y="15" width="17" height="17" rx="4" fill="none" stroke="#ff6700"/>
          <text x="14" y="50" class="label">Editor</text>
          <text x="14" y="66" class="orange small">Visible</text>
        </g>
        <g transform="translate(254 312)">
          <rect width="108" height="76" rx="14" class="chip"/>
          <rect x="14" y="15" width="17" height="17" rx="4" fill="none" stroke="#ff6700"/>
          <text x="14" y="50" class="label">Logs</text>
          <text x="14" y="66" class="orange small">Hidden</text>
        </g>
      </g>
    </g>
  </g>
</svg>
