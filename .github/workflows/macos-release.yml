name: Build macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            arch: arm64
            runner: macos-15
            package_script: package:mac:arm64
            asset_name: LocalLeaf-Host-mac-arm64.dmg
          - label: Intel
            arch: x64
            runner: macos-15
            package_script: package:mac:x64
            asset_name: LocalLeaf-Host-mac-x64.dmg

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      LOCALLEAF_TARGET_PLATFORM: darwin
      LOCALLEAF_TARGET_ARCH: ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Node 26.3.0 bundles npm 11.16.0, matching package.json and .npmrc.
          node-version: "26.3.0"

      - name: Verify npm hardening support
        run: |
          NPM_VERSION="$(npm --version)"
          node -e "const v=process.argv[1].split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 16)) { console.error('npm >= 11.16.0 is required; found ' + process.argv[1]); process.exit(1); }" "$NPM_VERSION"

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Rebuild approved install-script dependencies
        # Work around npm/cli#8970 only for the reviewed package allowlist.
        run: |
          set -euo pipefail
          npm config delete ignore-scripts --location=project
          trap 'npm config set ignore-scripts=true --location=project' EXIT
          npm rebuild electron esbuild
          node -e "require('electron')"

      - name: Create macOS icon
        run: |
          chmod +x scripts/create-mac-icon.sh
          scripts/create-mac-icon.sh

      - name: Download bundled binaries
        run: npm run prepare:binaries

      - name: Run tests
        run: npm test

      - name: Build macOS app
        run: npm run ${{ matrix.package_script }}

      - name: Normalize DMG filename
        run: |
          DMG="$(find release -maxdepth 1 -name '*.dmg' -print -quit)"
          if [ -z "$DMG" ]; then
            echo "No DMG was produced"
            exit 1
          fi
          cp "$DMG" "release/${{ matrix.asset_name }}"
          ls -lh release

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/${{ matrix.asset_name }}

  publish:
    name: Publish ${{ matrix.asset_name }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_name: LocalLeaf-Host-mac-arm64.dmg
          - asset_name: LocalLeaf-Host-mac-x64.dmg
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ matrix.asset_name }}
          path: release

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes "LocalLeaf release $TAG" || gh release view "$TAG" >/dev/null
          gh release upload "$TAG" "release/${{ matrix.asset_name }}" --clobber
