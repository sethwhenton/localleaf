name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      LOCALLEAF_TARGET_PLATFORM: win32
      LOCALLEAF_TARGET_ARCH: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download bundled binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run prepare:binaries

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run package:win

      - name: Normalize installer filename
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path release -Filter "LocalLeaf Host Setup *.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows installer was produced"
          }
          Copy-Item -LiteralPath $installer.FullName -Destination "release/LocalLeaf-Host-Setup.exe" -Force
          Get-ChildItem release | Format-Table Name, Length, LastWriteTime

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalLeaf-Host-Setup.exe
          path: release/LocalLeaf-Host-Setup.exe

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "v$(node -p "require('./package.json').version")"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "LocalLeaf release $tag"
            if ($LASTEXITCODE -ne 0) {
              gh release view $tag
              if ($LASTEXITCODE -ne 0) {
                throw "Could not create or find release $tag"
              }
            }
          }
          gh release upload $tag "release/LocalLeaf-Host-Setup.exe" --clobber
