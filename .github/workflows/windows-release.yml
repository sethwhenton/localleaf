name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest
    permissions:
      contents: read

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      LOCALLEAF_TARGET_PLATFORM: win32
      LOCALLEAF_TARGET_ARCH: x64

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Node 26.3.0 bundles npm 11.16.0, matching package.json and .npmrc.
          node-version: "26.3.0"

      - name: Verify npm hardening support
        shell: pwsh
        run: |
          $npmVersion = npm --version
          $parts = $npmVersion.Split(".") | ForEach-Object { [int]$_ }
          if ($parts[0] -lt 11 -or ($parts[0] -eq 11 -and $parts[1] -lt 16)) {
            throw "npm >= 11.16.0 is required; found $npmVersion"
          }

      - name: Install dependencies with reviewed lifecycle allowlist
        shell: pwsh
        run: |
          $env:npm_config_ignore_scripts = "false"
          if ((npm config get ignore-scripts).Trim() -ne "false") { throw "Could not scope lifecycle override" }
          npm ci
          if ($LASTEXITCODE -ne 0) { throw "Allowlisted dependency install failed" }
          node -e "require('electron')"
          if ($LASTEXITCODE -ne 0) { throw "Electron runtime verification failed" }

      - name: Download bundled binaries
        run: npm run prepare:binaries

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run package:win

      - name: Normalize installer filename
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path release -Filter "LocalLeaf Host Setup *.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows installer was produced"
          }
          Copy-Item -LiteralPath $installer.FullName -Destination "release/LocalLeaf-Host-Setup.exe" -Force
          Get-ChildItem release | Format-Table Name, Length, LastWriteTime

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: LocalLeaf-Host-Setup.exe
          path: release/LocalLeaf-Host-Setup.exe

  publish:
    name: Publish Windows Installer
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: LocalLeaf-Host-Setup.exe
          path: release

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes "LocalLeaf release $TAG" || gh release view "$TAG" >/dev/null
          gh release upload "$TAG" "release/LocalLeaf-Host-Setup.exe" --clobber
