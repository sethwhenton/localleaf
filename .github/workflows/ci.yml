name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and regression tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      PMG_DISABLE_TELEMETRY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Node 24.18.0 is the current LTS release and bundles npm 11.16.0,
          # the first release supporting every fail-closed control used here.
          node-version: "24.18.0"

      - name: Start Package Manager Guard
        uses: safedep/pmg@cb34b76fbcd1d1d517b1c0922b32d0ecf3f0e4a2 # v1
        with:
          server-mode: true

      - name: Verify npm hardening support
        run: |
          NPM_VERSION="$(npm --version)"
          node -e "const v=process.argv[1].split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 16)) { console.error('npm >= 11.16.0 is required; found ' + process.argv[1]); process.exit(1); }" "$NPM_VERSION"

      - name: Install dependencies with reviewed lifecycle allowlist
        # npm/cli#8970 prevents a later selective rebuild. npm 11.16 instead
        # enforces package.json allowScripts with strict-allow-scripts=true, so
        # only the pinned Electron/esbuild hooks can run and all others fail.
        run: |
          export npm_config_ignore_scripts=false
          unset ELECTRON_SKIP_BINARY_DOWNLOAD
          test "$(npm config get ignore-scripts)" = "false"
          node -e "if ('ELECTRON_SKIP_BINARY_DOWNLOAD' in process.env) process.exit(1)"
          pmg npm ci --ignore-scripts=false --foreground-scripts
          node -e "require('electron')"

      - name: Check JavaScript syntax
        run: find src public tests scripts landing-page -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | xargs -0 -n1 node --check

      - name: Build clients and run regression tests
        run: pmg npm test

      - name: Verify generated clients are current
        run: git diff --exit-code -- public/editor.bundle.js public/pdf-preview.bundle.js public/pdf.worker.bundle.js

      - name: Run rendered Electron regression gate
        env:
          # GitHub's unprivileged runner cannot use Electron's setuid helper.
          # The launcher accepts this override only on Linux GitHub Actions.
          LOCALLEAF_RENDERED_SMOKE_NO_SANDBOX: "true"
        run: xvfb-run --auto-servernum --server-args="-screen 0 1024x640x24" pmg npm run test:rendered

      - name: Enforce Package Manager Guard policy
        if: always()
        run: pmg proxy stop --fail-on-violation

  windows-smoke:
    name: Windows build and regression smoke
    runs-on: windows-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Keep the Windows smoke on the same LTS runtime and npm policy floor.
          node-version: "24.18.0"

      - name: Verify npm hardening support
        shell: pwsh
        run: |
          $version = (npm --version).Split('.') | ForEach-Object { [int]$_ }
          if ($version[0] -lt 11 -or ($version[0] -eq 11 -and $version[1] -lt 16)) {
            throw "npm >= 11.16.0 is required; found $(npm --version)"
          }

      - name: Install dependencies with reviewed lifecycle allowlist
        shell: pwsh
        run: |
          $env:npm_config_ignore_scripts = "false"
          Remove-Item Env:ELECTRON_SKIP_BINARY_DOWNLOAD -ErrorAction SilentlyContinue
          if ((npm config get ignore-scripts).Trim() -ne "false") { throw "Could not scope lifecycle override" }
          node -e "if ('ELECTRON_SKIP_BINARY_DOWNLOAD' in process.env) process.exit(1)"
          if ($LASTEXITCODE -ne 0) { throw "Could not enable Electron runtime download" }
          npm ci --ignore-scripts=false --foreground-scripts
          if ($LASTEXITCODE -ne 0) { throw "Allowlisted dependency install failed" }
          node -e "require('electron')"
          if ($LASTEXITCODE -ne 0) { throw "Electron runtime verification failed" }

      - name: Check JavaScript syntax
        shell: pwsh
        run: |
          $files = Get-ChildItem src, public, tests, scripts, landing-page -Recurse -File |
            Where-Object { $_.Extension -in '.js', '.mjs' }
          foreach ($file in $files) {
            node --check $file.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Build clients and run regression tests
        run: npm test

      - name: Verify generated clients are current
        run: git diff --exit-code -- public/editor.bundle.js public/pdf-preview.bundle.js public/pdf.worker.bundle.js

      - name: Run rendered Electron regression gate
        run: npm run test:rendered
